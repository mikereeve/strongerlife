# Env vars (set in Netlify UI, not here): NEXT_PUBLIC_GA_MEASUREMENT_ID,
# NEXT_PUBLIC_GSC_VERIFICATION_ID (optional), Sanity, GA4 API, ADMIN_PASSWORD.
# See .env.example. Redeploy after changing NEXT_PUBLIC_* values.

# Redirect www to non-www (301 permanent) at the CDN edge
[[redirects]]
  from = "https://www.thestrongerlifemn.org/*"
  to = "https://thestrongerlifemn.org/:splat"
  status = 301
  force = true

# Cache static assets for repeat visits (addresses PageSpeed "efficient cache policy")
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
